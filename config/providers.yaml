providers:
  deepseek:
    type: openai # Совместим с OpenAI API
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    stream_format: sse
  openrouter:
    type: openai
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    stream_format: sse
    headers:
      HTTP-Referer: "https://nnp.space"
      X-Title: "nnp.space"
  orange:
    type: openai
    base_url: http://10.10.1.20:5010/v1
    api_key_env: ORANGE_API_KEY
    stream_format: sse
  embedding:
    type: openai
    base_url: http://10.10.1.20:5020/v1
    api_key_env: ORANGE_API_KEY
    stream_format: sse
  transcriber:
    type: openai
    base_url: http://10.10.1.20:5042/v1
    api_key_env: TRANSCRIPTIONS_API_KEY
    stream_format: sse
  ollama:
    type: ollama
    base_url: http://10.10.1.20:11434/api
    stream_format: ndjson
